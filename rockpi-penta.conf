[fan]
# Fan temperature thresholds tuned for SSD temperatures (not CPU).
# SSDs should be kept below 50°C ideally.
# lv0: fan at 25% | lv1: 50% | lv2: 75% | lv3: 100%
# Below lv0 the fan is off.
lv0 = 35
lv1 = 42
lv2 = 48
lv3 = 55

[key]
# Available functions: slider, switch, reboot, poweroff, none
click = slider
twice = switch
press = reboot

[time]
# twice: maximum time between double clicking (seconds)
# press: long press time (seconds)
twice = 0.7
press = 3.0

[slider]
# Whether the oled auto display next page and the time interval (seconds)
auto = false
time = 10

[oled]
# Whether rotate the text of oled 180 degrees, whether use Fahrenheit
rotate = false
f-temp = false
